apiVersion: apps/v1
kind: Deployment
metadata:
  name: quicklook-demo
  labels:
    app.kubernetes.io/name: quicklook-demo
    app.kubernetes.io/part-of: samples
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quicklook-demo
  template:
    metadata:
      labels:
        app: quicklook-demo
    spec:
      containers:
        - name: api
          image: ghcr.io/example/quicklook-demo:1.4.2
          ports:
            - containerPort: 8080
          env:
            - name: LOG_LEVEL
              value: "debug"
            - name: FEATURE_FLAGS
              value: "preview,syntax,copy"
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
